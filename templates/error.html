<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{CODE}} {{MESSAGE}} | Ferrox</title>
  <style>
    :root {
      --bg: #fff7ed;
      --card: #ffedd5;
      --text: #7c2d12;
      --accent: #ea580c;
      --muted: #9a3412;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #ffedd5 0%, var(--bg) 60%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid #fdba74;
      border-radius: 14px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(124, 45, 18, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: var(--accent);
    }

    p {
      margin: 12px 0 0;
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      color: var(--muted);
    }

    footer {
      margin-top: 22px;
      font-size: 0.9rem;
      color: #b45309;
    }
  </style>
</head>
<body>
  <main>
    <h1>{{CODE}}</h1>
    <p>{{MESSAGE}}</p>
    <footer>Powered by Ferrox</footer>
  </main>
</body>
</html>
